# ========================================
# Redis 配置文件
# ========================================

# 绑定所有接口（容器内）
bind 0.0.0.0

# 端口
port 6379

# 密码（与 .env 保持一致）
requirepass redis123456

# 后台运行（Docker 中需设为 no）
daemonize no

# 日志级别: debug / verbose / notice / warning
loglevel notice
logfile ""

# 数据库数量
databases 16

# ========================================
# 持久化 - RDB
# ========================================
# 900秒内至少1个key变化则保存
save 900 1
# 300秒内至少10个key变化则保存
save 300 10
# 60秒内至少10000个key变化则保存
save 60 10000

# RDB 文件名和目录
dbfilename dump.rdb
dir /data

# ========================================
# 持久化 - AOF
# ========================================
appendonly yes
appendfilename "appendonly.aof"
# appendfsync: always / everysec / no
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ========================================
# 内存策略
# ========================================
# 最大内存（根据宿主机情况调整）
maxmemory 256mb
# 内存淘汰策略: noeviction / allkeys-lru / volatile-lru / allkeys-random 等
maxmemory-policy allkeys-lru

# ========================================
# 慢查询日志
# ========================================
slowlog-log-slower-than 10000
slowlog-max-len 128

# ========================================
# 其他
# ========================================
tcp-keepalive 300
timeout 0
tcp-backlog 511
hz 10
dynamic-hz yes

# 保护模式（容器网络中关闭，由网络隔离保护）
protected-mode no

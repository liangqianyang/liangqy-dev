# ==============================================
# liangqy 本地开发环境
# 包含: Nginx, MySQL, Redis, PHP(7.4/8.3/8.4),
#       ClickHouse, Elasticsearch, Kafka
# ==============================================

networks:
  dev-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql-data:
  redis-data:
  es-data:
  es-logs:
  clickhouse-data:
  clickhouse-logs:
  kafka-data:

services:

  # ============================================================
  # Nginx 1.27.x (stable)
  # 注意：1.29.x 为开发版，官方镜像暂无该版本，使用最新 stable
  # ============================================================
  nginx:
    image: nginx:1.27.4-alpine
    container_name: dev-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ${CODE_DIR:-./www}:/var/www/html:rw        # 代码目录
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro # 主配置
      - ./nginx/conf.d:/etc/nginx/conf.d:ro          # 站点配置
      - ./nginx/ssl:/etc/nginx/ssl:ro                # SSL 证书
      - ./nginx/logs:/var/log/nginx:rw               # 日志持久化
    networks:
      - dev-network
    depends_on:
      - php74
      - php83
      - php84
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # MySQL 9.0 (官方镜像最新 9.x 为 9.0)
  # ============================================================
  mysql:
    image: mysql:9.0
    container_name: dev-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-default_db}
      MYSQL_USER: ${MYSQL_USER:-developer}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dev123456}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql                    # 数据持久化（named volume）
      - ./mysql/conf.d:/etc/mysql/conf.d:ro          # 自定义配置
      - ./mysql/init:/docker-entrypoint-initdb.d:ro  # 初始化 SQL
      - ./mysql/logs:/var/log/mysql:rw               # 日志
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================
  # Redis 7.2
  # ============================================================
  redis:
    image: redis:7.2-alpine
    container_name: dev-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data                            # 数据持久化
      - ./redis/redis.conf:/etc/redis/redis.conf:ro # 自定义配置
    networks:
      - dev-network
    command: redis-server /etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # PHP 7.4-FPM
  # ============================================================
  php74:
    build:
      context: ./php/php74
      dockerfile: Dockerfile
    container_name: dev-php74
    restart: unless-stopped
    ports:
      - "${PHP74_PORT:-9074}:9000"
    volumes:
      - ${CODE_DIR:-./www}:/var/www/html:rw
      - ./php/php74/php.ini:/usr/local/etc/php/php.ini:ro
      - ./php/php74/php-fpm.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      - ./php/php74/extensions.ini:/usr/local/etc/php/conf.d/99-custom-extensions.ini:ro
      - ./php/php74/supervisord.conf:/etc/supervisor/supervisord.conf:ro
      - ./php/logs/php74:/var/log/php:rw
    networks:
      - dev-network
    environment:
      TZ: Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ============================================================
  # PHP 8.3-FPM
  # ============================================================
  php83:
    build:
      context: ./php/php83
      dockerfile: Dockerfile
    container_name: dev-php83
    restart: unless-stopped
    ports:
      - "${PHP83_PORT:-9083}:9000"
    volumes:
      - ${CODE_DIR:-./www}:/var/www/html:rw
      - ./php/php83/php.ini:/usr/local/etc/php/php.ini:ro
      - ./php/php83/php-fpm.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      - ./php/php83/extensions.ini:/usr/local/etc/php/conf.d/99-custom-extensions.ini:ro
      - ./php/php83/supervisord.conf:/etc/supervisor/supervisord.conf:ro
      - ./php/logs/php83:/var/log/php:rw
    networks:
      - dev-network
    environment:
      TZ: Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ============================================================
  # PHP 8.4-FPM
  # ============================================================
  php84:
    build:
      context: ./php/php84
      dockerfile: Dockerfile
    container_name: dev-php84
    restart: unless-stopped
    ports:
      - "${PHP84_PORT:-9084}:9000"
    volumes:
      - ${CODE_DIR:-./www}:/var/www/html:rw
      - ./php/php84/php.ini:/usr/local/etc/php/php.ini:ro
      - ./php/php84/php-fpm.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      - ./php/php84/extensions.ini:/usr/local/etc/php/conf.d/99-custom-extensions.ini:ro
      - ./php/php84/supervisord.conf:/etc/supervisor/supervisord.conf:ro
      - ./php/logs/php84:/var/log/php:rw
    networks:
      - dev-network
    environment:
      TZ: Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ============================================================
  # Elasticsearch 8.x（含 Kibana 作为 ES 访问客户端）
  # 已安装 IK 中文分词插件 (elasticsearch-analysis-ik)
  # ============================================================
  elasticsearch:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    image: dev-elasticsearch:8.17.0   # 构建后缓存的镜像名
    container_name: dev-elasticsearch
    restart: unless-stopped
    ports:
      - "${ES_PORT:-9200}:9200"
      - "${ES_TCP_PORT:-9300}:9300"
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ES_PASSWORD:-es123456}
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - TZ=Asia/Shanghai
    volumes:
      - es-data:/usr/share/elasticsearch/data         # 数据持久化
      - es-logs:/usr/share/elasticsearch/logs           # 日志（named volume，避免权限问题）
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - ./elasticsearch/jvm.options:/usr/share/elasticsearch/config/jvm.options:ro
    networks:
      - dev-network
    mem_limit: 800m
    memswap_limit: 800m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ES_PASSWORD:-es123456} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ES 访问客户端：Kibana
  kibana:
    image: kibana:8.17.0
    container_name: dev-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD:-kibana123456}
      - TZ=Asia/Shanghai
    volumes:
      - ./elasticsearch/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    networks:
      - dev-network
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ============================================================
  # ClickHouse 24.3 LTS
  # ============================================================
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: dev-clickhouse
    restart: unless-stopped
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"   # HTTP 接口
      - "${CLICKHOUSE_TCP_PORT:-9000}:9000"    # TCP 原生接口
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse123456}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      TZ: Asia/Shanghai
    volumes:
      - clickhouse-data:/var/lib/clickhouse                       # 数据持久化
      - clickhouse-logs:/var/log/clickhouse-server                # 日志持久化
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.xml:ro
      - ./clickhouse/conf.d:/etc/clickhouse-server/conf.d:ro
    networks:
      - dev-network
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # Kafka 3.7 (KRaft 模式，无需 Zookeeper)
  # 容器内访问: kafka:9092
  # 宿主机外部访问: localhost:19092
  # ============================================================
  kafka:
    image: bitnami/kafka:3.7
    container_name: dev-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_EXTERNAL_PORT:-19092}:19092"  # 宿主机外部访问端口
    env_file:
      - ./kafka/kafka.env                       # 全部 Kafka 配置通过此文件管理
    volumes:
      - kafka-data:/bitnami/kafka/data          # 消息数据持久化（named volume）
      - ./kafka/logs:/opt/bitnami/kafka/logs:rw # 日志持久化（本地可查）
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Kafka 可视化管理界面
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: dev-kafka-ui
    restart: unless-stopped
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=dev-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - TZ=Asia/Shanghai
    networks:
      - dev-network
    depends_on:
      kafka:
        condition: service_healthy

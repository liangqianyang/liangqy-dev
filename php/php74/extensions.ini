; ============================================================
; PHP 7.4 自定义扩展配置文件
; 路径映射到: /usr/local/etc/php/conf.d/99-custom-extensions.ini
;
; 用法：
;   - 新增 PECL 扩展后在此文件追加 extension=xxx.so
;   - 无需重新构建镜像，重启容器即可生效
;   - 对于需要编译的新扩展，请修改 Dockerfile 后重新 build
; ============================================================

; ---- 已启用的扩展 ----
; （以下扩展已在 Dockerfile 中通过 docker-php-ext-enable 加载）
; 此文件可用于覆盖扩展级别的配置参数

; Redis 扩展配置
; extension=redis.so
[redis]
redis.session.locking_enabled = 1
redis.session.lock_retries = -1
redis.session.lock_wait_time = 2000000

; Swoole 配置
[swoole]
swoole.use_shortname = Off

; MongoDB 配置
; extension=mongodb.so

; RdKafka 配置
[rdkafka]
; 已通过 Dockerfile 内 docker-php-ext-enable 加载
; 如需调整日志级别：0=关闭 1=错误 2=警告 3=信息 4=debug
rdkafka.log.level = 3

; ---- 按需新增扩展示例 ----
; 安装新的 PECL 扩展后，取消对应行的注释即可：

; extension=xdebug.so
; xdebug.mode = debug
; xdebug.start_with_request = yes
; xdebug.client_host = host.docker.internal
; xdebug.client_port = 9003
; xdebug.log = /var/log/php/xdebug.log

; extension=grpc.so
; extension=protobuf.so
; extension=amqp.so
; extension=apcu.so

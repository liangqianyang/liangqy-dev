; ============================================================
; PHP-FPM www pool 配置 - PHP 8.3
; ============================================================

[www]
; 运行用户
user = www-data
group = www-data

; 监听
listen = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; 进程管理
pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 500
pm.process_idle_timeout = 10s

; 慢日志
slowlog = /var/log/php/php83-fpm-slow.log
request_slowlog_timeout = 10s

; 访问日志
access.log = /var/log/php/php83-fpm-access.log
access.format = "%R - %u %t \"%m %r%Q%q\" %s %f %{mili}d %{kilo}M %C%%"

; 状态页（可通过 nginx 开放）
pm.status_path = /status
ping.path = /ping
ping.response = pong

; 环境变量
clear_env = no
env[HOSTNAME] = $HOSTNAME
env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /tmp
env[TMPDIR] = /tmp
env[TEMP] = /tmp

; PHP 值覆盖（可在 pool 级别覆盖 php.ini）
; php_flag[display_errors] = on
; php_value[memory_limit] = 256M
